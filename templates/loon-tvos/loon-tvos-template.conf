# tvOS Loon template

[General]
allow-wifi-access = true
allow-remote-access = false
dns-server = system, 1.1.1.1, 8.8.8.8
skip-proxy = 127.0.0.1, localhost, *.local

[Proxy]
节点1 = ss, example.com, 443, encrypt-method=aes-128-gcm, password=password, udp-relay=true

[Proxy Group]
PROXY = select, 节点1, DIRECT
MEDIA = select, PROXY, DIRECT
PLATFORM = select, PROXY, DIRECT
AI = select, PROXY, DIRECT
FINAL = select, PROXY, DIRECT

[Rule]
RULE-SET,https://raw.githubusercontent.com/cc166/ShuntRules/main/custom/Loon/Media.lsr,MEDIA
RULE-SET,https://raw.githubusercontent.com/cc166/ShuntRules/main/custom/Loon/Platform.lsr,PLATFORM
RULE-SET,https://raw.githubusercontent.com/cc166/ShuntRules/main/custom/Loon/AI.lsr,AI
FINAL,FINAL
