  - {name: 🎥 Netflix, type: select, proxies: [🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动]}
  - {name: 🌎 国外媒体, type: select, proxies: [🚀 手动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动, 🎯 全球直连]}
  - {name: 🇬 谷歌服务, type: select, proxies: [🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动, 🎯 全球直连]}
  - {name: 🍎 苹果服务, type: select, proxies: [🎯 全球直连, 🚀 手动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动]}
  - {name: Ⓜ️ 微软服务, type: select, proxies: [🎯 全球直连, 🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动]}
  - {name: 🎮 Steam, type: select, proxies: [🎯 全球直连, 🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动]}
  - {name: 🎮 游戏选择, type: select, proxies: [🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇰🇷 韩国自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动, 🎯 全球直连]}
  - {name: 🎥 Emby, type: select, proxies: [🌎 国外媒体, 🚀 手动选择, 🇭🇰 香港自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动, 🎯 全球直连]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 手动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇯🇵 日本自动, 🇰🇷 韩国自动, 🇸🇬 新加坡自动, 🇺🇸 美国自动, 🎯 全球直连]}

  - {name: 🇭🇰 香港自动, <<: *UrlTest, use: [SubStore], filter: *FilterHK}
  - {name: 🇹🇼 台湾自动, <<: *UrlTest, use: [SubStore], filter: *FilterTW}
