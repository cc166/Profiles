# OpenClash custom template (upstream-first / iKeLee-aligned)
# 说明：
# - 保留 iKeLee 的 mihomo / OpenClash 基础框架与常用设置
# - 按 glados 的分组思路做精简
# - 不内置 provider，适合 OpenClash 订阅转换后直接套用
# - 关键规则链接尽量按 iKeLee 模板的上游规则来
# - ChatGPT 合并进 AI；Disney/HBO/PrimeVideo/AppleTV+/Emby/Spotify/Bahamut 合并进国外媒体

port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894

unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true

external-controller: 0.0.0.0:9090

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - Mijia Cloud

tun:
  enable: true
  stack: system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "*"
    - +.lan
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query

FilterHK: &FilterHK '^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterTW: &FilterTW '^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterJP: &FilterJP '^(?=.*((?i)🇯🇵|日本|东京|大阪|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterKR: &FilterKR '^(?=.*((?i)🇰🇷|韩国|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterSG: &FilterSG '^(?=.*((?i)🇸🇬|新加坡|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterUS: &FilterUS '^(?=.*((?i)🇺🇸|美国|洛杉矶|西雅图|纽约|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$'
FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|流量|到期|机场|订阅|作者|教程|更新)).*$'

UrlTest: &UrlTest {type: url-test, interval: 6, tolerance: 20, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
RuleProviders: &RuleProviders {type: http, behavior: classical, interval: 3600, format: yaml, proxy: DIRECT}

proxy-groups:
  - {name: 🚀 手动选择, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇹🇼 台湾节点, 🇰🇷 韩国节点]}
  - {name: 💬 即时通讯, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🌐 社交媒体, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🚀 GitHub, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🤖 AI服务, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择]}
  - {name: 🎶 TikTok, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择]}
  - {name: 📹 YouTube, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择]}
  - {name: 🎥 Netflix, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择]}
  - {name: 🌎 国外媒体, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🛒 国外电商, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 📢 谷歌FCM, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🇬 谷歌服务, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🍎 苹果服务, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🚀 手动选择]}
  - {name: Ⓜ️ 微软服务, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🚀 手动选择]}
  - {name: 🎮 游戏平台, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🚀 手动选择]}
  - {name: 🎮 Steam, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🚀 手动选择]}
  - {name: 🚀 测速工具, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🎯 全球直连, 🚀 手动选择]}
  - {name: 🐟 漏网之鱼, type: select, include-all-providers: true, filter: *FilterAll, proxies: [🚀 手动选择, 🎯 全球直连]}
  - {name: 🔀 非标端口, type: select, proxies: [🐟 漏网之鱼, 🎯 全球直连]}
  - {name: 🇭🇰 香港节点, <<: *UrlTest, filter: *FilterHK}
  - {name: 🇹🇼 台湾节点, <<: *UrlTest, filter: *FilterTW}
  - {name: 🇯🇵 日本节点, <<: *UrlTest, filter: *FilterJP}
  - {name: 🇰🇷 韩国节点, <<: *UrlTest, filter: *FilterKR}
  - {name: 🇸🇬 新加坡节点, <<: *UrlTest, filter: *FilterSG}
  - {name: 🇺🇸 美国节点, <<: *UrlTest, filter: *FilterUS}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT]}

rule-providers:
  LAN:
    <<: *RuleProviders
    path: './rules/LAN.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/LAN_SPLITTER.yaml'

  Direct:
    <<: *RuleProviders
    path: './rules/Direct.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/Direct.yaml'

  Proxy:
    <<: *RuleProviders
    path: './rules/Proxy.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/Proxy.yaml'

  AI:
    <<: *RuleProviders
    path: './rules/AI.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/AI.yaml'

  TikTok:
    <<: *RuleProviders
    path: './rules/TikTok.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/TikTok.yaml'

  SpeedtestIntl:
    <<: *RuleProviders
    path: './rules/SpeedtestInternational.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/SpeedtestInternational.yaml'

  Game:
    <<: *RuleProviders
    path: './rules/Game.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/Game.yaml'

  Netflix:
    <<: *RuleProviders
    path: './rules/Netflix.yaml'
    url: 'https://rule.kelee.one/Clash/Netflix.yaml'

  ESET_China:
    <<: *RuleProviders
    path: './rules/ESET_China.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/ESET_China.yaml'

  PortDirect:
    <<: *RuleProviders
    path: './rules/PortDirect.yaml'
    url: 'https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml'

rules:
  - RULE-SET,LAN,🎯 全球直连
  - RULE-SET,Direct,🎯 全球直连
  - RULE-SET,ESET_China,🎯 全球直连
  - RULE-SET,AI,🤖 AI服务
