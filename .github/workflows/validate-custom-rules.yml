name: Validate Custom Rules

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate generated custom rules
        run: |
          python sync_rules.py
          python validate_custom_rules.py
          git diff --exit-code -- custom-rules
