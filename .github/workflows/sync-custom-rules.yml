name: Sync Custom Rules

on:
  workflow_dispatch:
  push:
    paths:
      - 'custom-rules/*.lsr'
      - 'custom-rules/*.yaml'
      - 'sync_rules.py'
      - 'validate_custom_rules.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync custom rules
        run: python sync_rules.py
      - name: Validate custom rules
        run: python validate_custom_rules.py
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add custom-rules
          if git diff --cached --quiet; then
            echo "No custom rules changes to commit"
            exit 0
          fi
          git commit -m "chore: sync custom rules (auto)"
          git push
