name: ci

on:
  push:
    branches: [master]
    paths:
      - 'custom-rules/**'
      - 'sync_rules.py'
      - 'validate_custom_rules.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python sync_rules.py
      - run: python validate_custom_rules.py
      - name: update
        shell: bash
        run: |
          if git diff --quiet -- custom-rules; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom-rules
          git commit -m "chore: update generated rules"
          git push
