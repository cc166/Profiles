name: Auto Update Rules

on:
  push:
    paths:
      - 'custom-rules/self-use-loon-source.txt'
      - 'custom-rules/self-use-openclash-source.txt'
      - 'custom-rules/self-use-proxy-loon-source.txt'
      - 'custom-rules/self-use-proxy-openclash-source.txt'
      - 'update_self_use_rules.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run self use generator
        run: python update_self_use_rules.py
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add custom-rules/self-use-loon-rules.lsr custom-rules/self-use-openclash-rules.yaml custom-rules/self-use-proxy-loon-rules.lsr custom-rules/self-use-proxy-openclash-rules.yaml
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: update minimal self use direct/proxy rules"
          git push
