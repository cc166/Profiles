name: Sync Upstream Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync upstream rule mirrors
        run: python upstream/scripts/sync_upstream_rules.py
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add upstream
          if git diff --cached --quiet; then
            echo "No upstream changes to commit"
            exit 0
          fi
          git commit -m "chore: sync upstream rules"
          git push
