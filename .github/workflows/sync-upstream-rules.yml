name: Sync Upstream Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

jobs:
  sync:
    concurrency:
      group: sync-upstream-rules
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync upstream rule mirrors
        run: |
          python upstream/scripts/sync_upstream_rules.py
          python - <<'PY'
          import json
          from pathlib import Path
          r = json.loads(Path('upstream/_sync_report.json').read_text())
          core_ok = len(r['core']['ok'])
          loon_ok = len(r['loon_remote']['ok'])
          expected_core = r['meta']['expected_core']
          expected_loon = r['meta']['expected_loon']
          if core_ok < expected_core or loon_ok < expected_loon:
              raise SystemExit(f"upstream fetch incomplete: core {core_ok}/{expected_core}, loon {loon_ok}/{expected_loon}")
          PY
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add upstream
          if git diff --cached --quiet; then
            echo "No upstream changes to commit"
            exit 0
          fi
          git commit -m "chore: sync upstream rules"
          git push
